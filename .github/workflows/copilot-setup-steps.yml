name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install GitVersion CLI (needed for build)
        run: dotnet tool install --global GitVersion.Tool --version 6.5.0

      - name: Restore NuGet packages
        run: dotnet restore tests/MarketData.Primitives.Tests/MarketData.Primitives.Tests.csproj /p:UseGitVersionTask=false
